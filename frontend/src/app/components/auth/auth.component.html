<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <h1>{{ isLogin ? 'Bienvenido' : 'Crear Cuenta' }}</h1>
      <p>{{ isLogin ? 'Ingresa para acceder al sistema' : 'Únete al sistema de triage académico' }}</p>
    </div>

    <div *ngIf="errorMsg" class="alert-error">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      {{ errorMsg }}
    </div>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="ejemplo@uniquindio.edu.co" 
          [class.invalid]="authForm.get('email')?.invalid && authForm.get('email')?.touched">
      </div>
      
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••" 
          [class.invalid]="authForm.get('password')?.invalid && authForm.get('password')?.touched">
      </div>

      <ng-container *ngIf="!isLogin">
        <div class="input-group">
          <label for="identificacion">Identificación</label>
          <input type="text" id="identificacion" formControlName="identificacion" placeholder="Documento de identidad">
        </div>
        <div class="row-group">
          <div class="input-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" formControlName="nombre" placeholder="Tu nombre">
          </div>
          <div class="input-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" formControlName="apellido" placeholder="Tus apellidos">
          </div>
        </div>
        <div class="input-group">
          <label for="rol">Rol académico</label>
          <select id="rol" formControlName="rol">
            <option value="ESTUDIANTE">Estudiante</option>
            <option value="DOCENTE">Docente</option>
            <option value="ADMINISTRATIVO">Administrativo</option>
          </select>
        </div>
      </ng-container>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">{{ isLogin ? 'Iniciar Sesión' : 'Crear Cuenta' }}</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p *ngIf="isLogin">¿No tienes cuenta? <a (click)="toggleMode()">Regístrate</a></p>
      <p *ngIf="!isLogin">¿Ya tienes cuenta? <a (click)="toggleMode()">Inicia sesión</a></p>
    </div>
  </div>
  
  <div class="auth-decoration">
    <div class="decoration-circle"></div>
    <div class="decoration-circle"></div>
    <div class="decoration-circle"></div>
  </div>
</div>
